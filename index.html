<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TavaScope</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 0;
            background-color: #121212;
            color: #ffffff;
        }
        header {
            background-color: #1f1f1f;
            padding: 10px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .logo-container {
            display: flex;
            align-items: center;
            gap: 12px; /* Adds clean spacing between the logo and the title */
        }
        .site-logo {
            height: 40px; /* Limits the logo height to fit perfectly in the nav bar */
            width: auto;
        }
        header h1 {
            margin: 0;
            font-size: 24px;
        }
        nav a {
            color: #ffffff;
            text-decoration: none;
            margin-left: 20px;
        }
        main {
            padding: 20px;
            text-align: center;
        }
        footer {
            background-color: #1f1f1f;
            text-align: center;
            padding: 10px 0;
            position: absolute;
            bottom: 0;
            width: 100%;
        }
    </style>
</head>
<body>

    <header>
        <div class="logo-container">
            <svg class="site-logo" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 500">
                <defs>
                    <linearGradient id="neonGlow" x1="0%" y1="0%" x2="0%" y2="100%">
                        <stop offset="0%" stop-color="#00d2ff" />
                        <stop offset="100%" stop-color="#00ff87" />
                    </linearGradient>
                </defs>
                <g transform="translate(250, 250)">
                    <polygon points="0,-180 155,-90 155,90 0,180 -155,90 -155,-90" fill="url(#neonGlow)" />
                    
                    <polygon points="0,-200 173,-100 173,100 0,200 -173,100 -173,-100" 
                             fill="none" 
                             stroke="#121212" 
                             stroke-width="24" 
                             stroke-linejoin="round" />
                             
                    <polygon points="0,-180 155,-90 155,90 0,180 -155,90 -155,-90" 
                             fill="none" 
                             stroke="#121212" 
                             stroke-width="12" 
                             stroke-linejoin="round" />

                    <text x="0" y="-15" 
                          font-family="'Montserrat', 'Helvetica Neue', 'Arial', sans-serif" 
                          font-size="68" 
                          font-weight="900" 
                          fill="#ffffff" 
                          text-anchor="middle" 
                          letter-spacing="4">TAVA</text>
                          
                    <text x="0" y="65" 
                          font-family="'Montserrat', 'Helvetica Neue', 'Arial', sans-serif" 
                          font-size="68" 
                          font-weight="900" 
                          fill="#ffffff" 
                          text-anchor="middle" 
                          letter-spacing="4">SCOPE</text>
                </g>
            </svg>
            <h1>TavaScope</h1>
        </div>
        <nav>
            <a href="#">Home</a>
            <a href="#">About</a>
            <a href="#">Contact</a>
        </nav>
    </header>

    <main>
        <h2>Welcome to TavaScope</h2>
        <p>Your portal for advanced monitoring, tracking, and project migration data.</p>
    </main>

    <footer>
        <p>&copy; 2026 TavaScope. All rights reserved.</p>
    </footer>

</body>
</html>
